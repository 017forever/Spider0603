<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>查詢動漫</title>
</head>
<body>

    <h1>查詢動漫</h1>

    <form action="/search" method="get">
        <input type="text" name="keyword" placeholder="請輸入動漫關鍵字">
        <input type="submit" value="查詢">
    </form>

    <hr>

    {% if keyword != "" %}
        <h2>查詢結果：{{ keyword }}</h2>

        {% if results %}
            {% for anime in results %}
                <h3>【{{ anime.category }}】{{ anime.name }}</h3>
                <p>集數：{{ anime.episode }}</p>
                {% if anime.date %}
                    <p>上架日：{{ anime.date }}</p>
                {% endif %}
                <a href="{{ anime.link }}" target="_blank">觀看連結</a>
                <hr>
            {% endfor %}
        {% else %}
            <p>查無資料</p>
        {% endif %}
    {% endif %}

    <a href="/">回首頁</a>

</body>
</html>
